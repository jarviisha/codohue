name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - .
          - ./pkg/codohuetypes
          - ./sdk/go
          - ./sdk/go/redistream
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Lint Go module
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: ${{ matrix.module }}

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: codohue
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: codohue
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install migrate CLI
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@v4.18.1

      - name: Run migrations
        run: migrate -path ./migrations -database "$DATABASE_URL" up
        env:
          DATABASE_URL: postgres://codohue:secret@localhost:5432/codohue?sslmode=disable

      - name: Test
        run: make coverage-check-all
        env:
          DATABASE_URL: postgres://codohue:secret@localhost:5432/codohue?sslmode=disable
          QDRANT_HOST: ""
          QDRANT_PORT: "6334"
          CODOHUE_ADMIN_API_KEY: ci-test-key

  web-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/admin/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install SPA deps
        run: npm ci --no-audit --no-progress
        working-directory: web/admin

      - name: Lint SPA
        run: npm run lint
        working-directory: web/admin

      - name: Test SPA contract
        run: npm test
        working-directory: web/admin

      - name: Build SPA
        run: npm run build
        working-directory: web/admin

      - name: Verify dist/ produced
        run: |
          test -s web/admin/dist/index.html
          # `index-*.js` is the main chunk; future route-splits add more chunks.
          # find -size +1c guards against an empty dist directory regardless of
          # how many chunks Vite emits.
          test -n "$(find web/admin/dist/assets -name 'index-*.js' -size +1c -print -quit)"

      - name: Build admin binary with embedded SPA
        run: go build -tags=embedui -o tmp/admin ./cmd/admin

      - name: Verify SPA bytes are in the binary
        run: |
          if ! grep -q -a '<!doctype html>' tmp/admin; then
            echo "::error::admin binary does not contain the embedded SPA"
            exit 1
          fi

  e2e:
    needs: [lint, test]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: codohue
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: codohue
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      qdrant:
        image: qdrant/qdrant:v1.17.1
        ports:
          - 6333:6333
          - 6334:6334

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install migrate CLI
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@v4.18.1

      - name: Run migrations
        run: migrate -path ./migrations -database "$DATABASE_URL" up
        env:
          DATABASE_URL: postgres://codohue:secret@localhost:5432/codohue?sslmode=disable

      - name: Wait for Qdrant gRPC
        run: timeout 30 bash -c 'until </dev/tcp/localhost/6334; do sleep 1; done'

      - name: Build E2E binaries
        run: make build

      - name: Run E2E tests
        run: go test -v -tags=e2e -timeout=120s ./e2e/...
        env:
          DATABASE_URL: postgres://codohue:secret@localhost:5432/codohue?sslmode=disable
          REDIS_URL: redis://localhost:6379
          QDRANT_HOST: localhost
          QDRANT_PORT: "6334"
          CODOHUE_ADMIN_API_KEY: ci-test-key
