name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_REPO: codohue

jobs:
  build-push:
    # event == 'push' pins this to push-triggered CI runs — without it a PR
    # from any branch whose name starts with "v" would also build and deploy.
    # main pushes produce dev images; v* tag pushes produce release images.
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      (github.event.workflow_run.head_branch == 'main' ||
       startsWith(github.event.workflow_run.head_branch, 'v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # main   → version=dev-<sha7>, alias=dev    (rolling dev channel)
      # v* tag → version=<tag>,      alias=latest (release channel)
      - name: Compute image tags
        id: meta
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [ "$HEAD_BRANCH" = "main" ]; then
            echo "version=dev-${HEAD_SHA:0:7}" >> "$GITHUB_OUTPUT"
            echo "alias=dev" >> "$GITHUB_OUTPUT"
          else
            echo "version=$HEAD_BRANCH" >> "$GITHUB_OUTPUT"
            echo "alias=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: api
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:${{ steps.meta.outputs.alias }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:${{ steps.meta.outputs.version }}
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.DOCKERHUB_REPO }}-api:${{ steps.meta.outputs.alias }}
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.DOCKERHUB_REPO }}-api:${{ steps.meta.outputs.version }}

      - name: Build and push Cron image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: cron
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/cron:${{ steps.meta.outputs.alias }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/cron:${{ steps.meta.outputs.version }}
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.DOCKERHUB_REPO }}-cron:${{ steps.meta.outputs.alias }}
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.DOCKERHUB_REPO }}-cron:${{ steps.meta.outputs.version }}

      - name: Build and push Embedder image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: embedder
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/embedder:${{ steps.meta.outputs.alias }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/embedder:${{ steps.meta.outputs.version }}
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.DOCKERHUB_REPO }}-embedder:${{ steps.meta.outputs.alias }}
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.DOCKERHUB_REPO }}-embedder:${{ steps.meta.outputs.version }}

      - name: Build and push Admin image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: admin
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/admin:${{ steps.meta.outputs.alias }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/admin:${{ steps.meta.outputs.version }}
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.DOCKERHUB_REPO }}-admin:${{ steps.meta.outputs.alias }}
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.DOCKERHUB_REPO }}-admin:${{ steps.meta.outputs.version }}

      - name: Build and push Migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/migrate.Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/migrate:${{ steps.meta.outputs.alias }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/migrate:${{ steps.meta.outputs.version }}
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.DOCKERHUB_REPO }}-migrate:${{ steps.meta.outputs.alias }}
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.DOCKERHUB_REPO }}-migrate:${{ steps.meta.outputs.version }}

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    # main deploys to the dev environment, v* tags to production. VPS_* secrets
    # are environment-scoped; both environments may point at the same host, so
    # each stack gets its own directory (compose derives the project name from
    # the directory, keeping containers/volumes/networks separate).
    environment: ${{ github.event.workflow_run.head_branch == 'main' && 'dev' || 'production' }}
    env:
      DEPLOY_DIR: ${{ github.event.workflow_run.head_branch == 'main' && '/opt/codohue-dev' || '/opt/codohue-prod' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Copy compose file and deploy script to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "docker-compose.prod.yml,deploy/deploy.sh"
          target: ${{ env.DEPLOY_DIR }}/
          overwrite: true

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -euo pipefail
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            IMAGE_TAG="${{ needs.build-push.outputs.image_tag }}" bash ${{ env.DEPLOY_DIR }}/deploy/deploy.sh
            docker logout ghcr.io
