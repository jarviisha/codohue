services:
  api:
    image: ghcr.io/jarviisha/codohue/api:latest
    restart: unless-stopped
    ports:
      - "2001:2001"
    environment:
      - DATABASE_URL=${CODOHUE_DATABASE_URL:?set CODOHUE_DATABASE_URL to the production Postgres URL}
      - REDIS_URL=redis://redis:6379
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334
      - CODOHUE_ADMIN_API_KEY=${CODOHUE_ADMIN_API_KEY:?set CODOHUE_ADMIN_API_KEY to the production admin API key}
      - CODOHUE_LOG_FORMAT=json
      - CODOHUE_BATCH_INTERVAL_MINUTES=5
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2001/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  cron:
    image: ghcr.io/jarviisha/codohue/cron:latest
    restart: unless-stopped
    environment:
      - DATABASE_URL=${CODOHUE_DATABASE_URL:?set CODOHUE_DATABASE_URL to the production Postgres URL}
      - REDIS_URL=redis://redis:6379
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334
      - CODOHUE_LOG_FORMAT=json
      - CODOHUE_BATCH_INTERVAL_MINUTES=5
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      qdrant:
        condition: service_started

  admin:
    image: ghcr.io/jarviisha/codohue/admin:latest
    restart: unless-stopped
    ports:
      - "2002:2002"
    environment:
      - DATABASE_URL=${CODOHUE_DATABASE_URL:?set CODOHUE_DATABASE_URL to the production Postgres URL}
      - REDIS_URL=redis://redis:6379
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334
      - CODOHUE_ADMIN_API_KEY=${CODOHUE_ADMIN_API_KEY:?set CODOHUE_ADMIN_API_KEY to the production admin API key}
      - CODOHUE_API_URL=http://api:2001
      - CODOHUE_ADMIN_PORT=2002
      - CODOHUE_LOG_FORMAT=json
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started

  migrate:
    image: ghcr.io/jarviisha/codohue/migrate:latest
    restart: on-failure
    environment:
      - DATABASE_URL=${CODOHUE_DATABASE_URL:?set CODOHUE_DATABASE_URL to the production Postgres URL}

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:v1.17.1
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  redis_data:
  qdrant_data:
