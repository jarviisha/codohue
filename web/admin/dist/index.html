<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codohue Admin</title>
  <style>
    body {
      font-family: ui-monospace, "JetBrains Mono", SFMono-Regular, Menlo, monospace;
      max-width: 42rem;
      margin: 8rem auto;
      padding: 0 1.5rem;
      color: #475569;
      background: #FFFFFF;
      line-height: 1.55;
    }
    h1 {
      color: #0F172A;
      font-size: 0.8125rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin: 0 0 2rem;
    }
    p { font-size: 0.875rem; margin: 0 0 0.75rem; }
    code {
      background: #F1F5F9;
      padding: 0 0.3rem;
      border-radius: 2px;
      font-size: 0.8125rem;
    }
    .pend { color: #94A3B8; }
    @media (prefers-color-scheme: dark) {
      body { background: #0B1120; color: #94A3B8; }
      h1 { color: #F1F5F9; }
      code { background: #152240; }
    }
  </style>
</head>
<body>
  <h1>Codohue Admin</h1>
  <p><span class="pend">[PEND]</span>&nbsp;SPA build pending.</p>
