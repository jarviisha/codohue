services:
  api:
    build:
      context: .
      target: api
    container_name: codohue-api
    network_mode: host
    extra_hosts:
      - "host.docker.internal:127.0.0.1"
    env_file:
      - path: .env
        required: false
      - path: .env.app
        required: false
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:$${API_PORT:-2001}/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  cron:
    build:
      context: .
      target: cron
    container_name: codohue-cron
    network_mode: host
    extra_hosts:
      - "host.docker.internal:127.0.0.1"
    env_file:
      - path: .env
        required: false
      - path: .env.app
        required: false

  admin:
    build:
      context: .
      target: admin
    container_name: codohue-admin
    network_mode: host
    extra_hosts:
      - "host.docker.internal:127.0.0.1"
    env_file:
      - path: .env
        required: false
      - path: .env.app
        required: false
    depends_on:
      api:
        condition: service_healthy
