services:
  migrate:
    build:
      context: .
      target: migrate
    container_name: codohue-migrate
    restart: on-failure
    environment:
      - DATABASE_URL=postgres://codohue:secret@postgres:5432/codohue?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      target: api
    container_name: codohue-api
    ports:
      - "2001:2001"
    environment:
      - DATABASE_URL=postgres://codohue:secret@postgres:5432/codohue?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334
      - RECOMMENDER_API_KEY=dev-secret-key
      - BATCH_INTERVAL_MINUTES=5
      - LOG_FORMAT=text
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2001/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: codohue-admin
    ports:
      - "2002:2002"
    environment:
      - DATABASE_URL=postgres://codohue:secret@postgres:5432/codohue?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - RECOMMENDER_API_KEY=dev-secret-key
      - API_URL=http://api:2001
      - ADMIN_PORT=2002
      - LOG_FORMAT=text
    depends_on:
      api:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: codohue-postgres
    environment:
      POSTGRES_USER: codohue
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: codohue
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/migrations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codohue"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: codohue-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: codohue-qdrant
    ports:
      - "6333:6333"   # HTTP
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
