services:
  migrate:
    build:
      context: .
      dockerfile: docker/migrate.Dockerfile
    container_name: codohue-migrate
    restart: on-failure
    environment:
      - DATABASE_URL=postgres://codohue:secret@postgres:5432/codohue?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      target: api
    container_name: codohue-api
    ports:
      - "${API_PORT:-2001}:${API_PORT:-2001}"
    environment:
      - DATABASE_URL=postgres://codohue:secret@postgres:5432/codohue?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334
      - CODOHUE_ADMIN_API_KEY=${CODOHUE_ADMIN_API_KEY:-dev-secret-key}
      - BATCH_INTERVAL_MINUTES=${BATCH_INTERVAL_MINUTES:-5}
      - LOG_FORMAT=${LOG_FORMAT:-text}
      - API_PORT=${API_PORT:-2001}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:$${API_PORT:-2001}/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  cron:
    build:
      context: .
      target: cron
    container_name: codohue-cron
    environment:
      - DATABASE_URL=postgres://codohue:secret@postgres:5432/codohue?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334
      - BATCH_INTERVAL_MINUTES=${BATCH_INTERVAL_MINUTES:-5}
      - LOG_FORMAT=${LOG_FORMAT:-text}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started

  embedder:
    build:
      context: .
      target: embedder
    container_name: codohue-embedder
    ports:
      - "${EMBEDDER_HEALTH_PORT:-2003}:${EMBEDDER_HEALTH_PORT:-2003}"
    environment:
      - DATABASE_URL=postgres://codohue:secret@postgres:5432/codohue?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334
      - LOG_FORMAT=${LOG_FORMAT:-text}
      - CATALOG_MAX_CONTENT_BYTES=${CATALOG_MAX_CONTENT_BYTES:-32768}
      - EMBED_MAX_ATTEMPTS=${EMBED_MAX_ATTEMPTS:-5}
      - EMBEDDER_HEALTH_PORT=${EMBEDDER_HEALTH_PORT:-2003}
      - EMBEDDER_REPLICA_NAME=${EMBEDDER_REPLICA_NAME:-}
      - EMBEDDER_NAMESPACE_POLL_INTERVAL=${EMBEDDER_NAMESPACE_POLL_INTERVAL:-30s}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started

  admin:
    build:
      context: .
      target: admin
    container_name: codohue-admin
    ports:
      - "${ADMIN_PORT:-2002}:${ADMIN_PORT:-2002}"
    environment:
      - DATABASE_URL=postgres://codohue:secret@postgres:5432/codohue?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334
      - CODOHUE_ADMIN_API_KEY=${CODOHUE_ADMIN_API_KEY:-dev-secret-key}
      - API_URL=http://api:${API_PORT:-2001}
      - ADMIN_PORT=${ADMIN_PORT:-2002}
      - LOG_FORMAT=${LOG_FORMAT:-text}
    depends_on:
      api:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: codohue-postgres
    environment:
      POSTGRES_USER: codohue
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: codohue
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/migrations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codohue"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: codohue-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: codohue-qdrant
    ports:
      - "6333:6333"   # HTTP
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
